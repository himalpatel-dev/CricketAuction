<div class="login-container">
    <div class="login-card fade-in">
        <div class="logo-section">
            <div class="branding-header">
                <div class="main-logo-wrapper">
                    <div class="logo-accent-glow"></div>
                    <img src="/assets/images/sidelogo.png" alt="BidWicket Logo" class="brand-main-logo">
                    <div class="brand-text-wrapper">
                        <h2 class="brand-name">Bid<span class="accent-text">Wicket</span></h2>
                        <p class="brand-tagline">Bid <span class="accent-text">Smart</span>. Build <span
                                class="accent-text">Champions.</span></p>
                    </div>
                </div>
            </div>

            <div class="branding-divider">
                <div class="accent-line"></div>
            </div>
        </div>

        <div *ngIf="error" class="error-msg fade-in">
            {{ error }}
        </div>

        <!-- Normal Sign In Form -->
        <form *ngIf="!mustChange" (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
            <div class="form-group">
                <label>USERNAME</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                    <input type="text" name="username" [(ngModel)]="credentials.username"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input [type]="showPassword ? 'text' : 'password'" name="password"
                        [(ngModel)]="credentials.password" placeholder="••••••••" required>
                    <span class="password-toggle" (click)="togglePasswordVisibility()">
                        <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-signin" [disabled]="loading">
                <span *ngIf="!loading">Sign In <i class="arrow-right">→</i></span>
                <span *ngIf="loading">Authenticating...</span>
            </button>
        </form>

        <!-- First Time Password Reset Form -->
        <form *ngIf="mustChange" (ngSubmit)="onSubmitNewPassword()" #resetForm="ngForm" class="login-form">
            <div
                style="text-align: center; margin-bottom: 25px; background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.2); padding: 15px; border-radius: 10px;">
                <h3 style="color: #60a5fa; margin: 0 0 5px 0; font-size: 16px; letter-spacing: 0.5px;">First Time Login
                </h3>
                <p style="font-size: 12px; color: #94a3b8; margin: 0;">For your security, you must change your temporary
                    password before proceeding.</p>
            </div>

            <div class="form-group">
                <label>NEW PASSWORD</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input [type]="showNewPassword ? 'text' : 'password'" name="newPassword" [(ngModel)]="newPassword"
                        placeholder="Minimum 6 characters" required>
                    <span class="password-toggle" (click)="toggleNewPasswordVisibility()">
                        <svg *ngIf="!showNewPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg *ngIf="showNewPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label>CONFIRM NEW PASSWORD</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword"
                        [(ngModel)]="confirmPassword" placeholder="Repeat password" required>
                    <span class="password-toggle" (click)="toggleConfirmPasswordVisibility()">
                        <svg *ngIf="!showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg *ngIf="showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-signin" [disabled]="loading"
                style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.4);">
                <span *ngIf="!loading">Update Password <i class="arrow-right">→</i></span>
                <span *ngIf="loading">Updating...</span>
            </button>

            <button type="button" class="btn-signin" (click)="cancelPasswordReset()"
                style="margin-top: 12px; background: transparent; border: 1px solid #334155; color: #94a3b8; box-shadow: none;">
                Cancel
            </button>
        </form>

        <div *ngIf="!mustChange" class="divider">
            <span>or</span>
        </div>

        <div *ngIf="!mustChange" class="registration-section">
            <button class="btn-register" routerLink="/register">
                <span class="register-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="17" y1="11" x2="23" y2="11"></line>
                    </svg>
                </span>
                Register as Player
                <i class="arrow-right">→</i>
            </button>
        </div>
    </div>
</div>
