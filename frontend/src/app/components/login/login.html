<div class="login-container">
    <div class="login-card fade-in">
        <div class="logo-section">


            <div class="branding-header">
                <div class="main-logo-wrapper">
                    <div class="logo-accent-glow"></div>
                    <img src="/assets/images/sidelogo.png" alt="BidWicket Logo" class="brand-main-logo">
                    <div class="brand-text-wrapper">
                        <h2 class="brand-name">Bid<span class="green-text">Wicket</span></h2>
                        <p class="brand-tagline">Bid Smart. Build <span class="green-text">Champions.</span></p>
                    </div>
                </div>
            </div>

            <div class="branding-divider">
                <div class="accent-line"></div>
            </div>
        </div>

        <div *ngIf="error" class="error-msg fade-in">
            {{ error }}
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
            <div class="form-group">
                <label>USERNAME</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                    <input type="text" name="username" [(ngModel)]="credentials.username"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" name="password" [(ngModel)]="credentials.password" placeholder="••••••••"
                        required>
                    <span class="password-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-signin" [disabled]="loading">
                <span *ngIf="!loading">Sign In <i class="arrow-right">→</i></span>
                <span *ngIf="loading">Authenticating...</span>
            </button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="registration-section">
            <button class="btn-register" routerLink="/register">
                <span class="register-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="17" y1="11" x2="23" y2="11"></line>
                    </svg>
                </span>
                Register as Player
                <i class="arrow-right">→</i>
            </button>
        </div>
    </div>
</div>
