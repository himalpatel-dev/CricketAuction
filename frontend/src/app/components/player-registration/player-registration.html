<div class="registration-page">
    <div class="background-decor">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

    <div class="registration-container">
        <div class="glass-card registration-card fade-in">
            <div class="card-header">
                <div class="badge-row">
                    <span class="badge yellow">Auction 2026</span>
                </div>
                <h1 class="gradient-text">Player Registration</h1>
                <p class="subtitle">Join the prestigious league and let teams bid for your talent</p>
            </div>

            <form (ngSubmit)="register()" #regForm="ngForm" class="registration-form">
                <!-- Tournament Selector Section -->
                <div class="form-section">
                    <div class="section-header">
                        <i class="icon">🏆</i>
                        <h3>Tournament Details</h3>
                    </div>
                    <div class="tournament-selector">
                        <div class="form-group full">
                            <label>Select Tournament *</label>
                            <div class="select-wrapper">
                                <select name="selectedTournament" [(ngModel)]="selectedTournamentId"
                                    (change)="onTournamentChange()" required>
                                    <option value="" disabled>Choose an active tournament</option>
                                    @for (t of tournaments; track t.id) {
                                    <option [value]="t.id">{{ t.name }} ({{ t.status }})</option>
                                    } @empty {
                                    <option value="" disabled>No active tournaments found</option>
                                    }
                                </select>
                            </div>
                            <div class="base-price-info" *ngIf="basePrice">
                                <span class="label">FIXED BASE PRICE</span>
                                <span class="value">₹{{ basePrice.toLocaleString('en-IN') }}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Personal Info Section -->
                <div class="form-section">
                    <div class="section-header">
                        <i class="icon">👤</i>
                        <h3>Personal Information</h3>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" name="name" [(ngModel)]="player.name" placeholder="e.g. Virat Kohli"
                                required>
                        </div>
                        <div class="form-group">
                            <label>Mobile Number *</label>
                            <input type="tel" name="mobile" [(ngModel)]="player.mobileNo" placeholder="e.g. 9876543210"
                                required>
                        </div>
                        <div class="form-group">
                            <label>Date of Birth *</label>
                            <input type="date" name="dob" [(ngModel)]="player.dob" required>
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <div class="select-wrapper">
                                <select name="gender" [(ngModel)]="player.gender">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Professional Details Section -->
                <div class="form-section">
                    <div class="section-header">
                        <i class="icon">🏏</i>
                        <h3>Professional Details</h3>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Playing Role *</label>
                            <div class="select-wrapper">
                                <select name="role" [(ngModel)]="player.role" required>
                                    <option value="Batsman">Batsman</option>
                                    <option value="Bowler">Bowler</option>
                                    <option value="All-Rounder">All-Rounder</option>
                                    <option value="Wicketkeeper">Wicketkeeper</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>City / Location</label>
                            <input type="text" name="city" [(ngModel)]="player.city" placeholder="e.g. Mumbai">
                        </div>
                        <div class="form-group">
                            <label>T-Shirt Size</label>
                            <div class="select-wrapper">
                                <select name="tshirt" [(ngModel)]="player.tShirtSize">
                                    <option value="">Select Size</option>
                                    <option value="S">Small (S)</option>
                                    <option value="M">Medium (M)</option>
                                    <option value="L">Large (L)</option>
                                    <option value="XL">Extra Large (XL)</option>
                                    <option value="XXL">Double XL (XXL)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Trouser Size</label>
                            <input type="text" name="trouser" [(ngModel)]="player.trouserSize"
                                placeholder="e.g. 32, 34">
                        </div>
                    </div>
                </div>

                <!-- Feedback Area -->
                <div class="feedback-area" *ngIf="message">
                    <div class="alert" [class.success]="success" [class.error]="!success">
                        <i class="icon">{{ success ? '✅' : '❌' }}</i>
                        <span>{{ message }}</span>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" routerLink="/login">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" [disabled]="loading || !regForm.valid">
                        {{ loading ? 'Registering...' : 'Complete Registration' }}
                        <span class="icon-arrow">→</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
